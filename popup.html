<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CloneGuard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #ffffff;
    }

    .header {
      background: #1F3864;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      font-size: 20px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
    }

    .header-sub {
      font-size: 11px;
      opacity: 0.7;
    }

    .body {
      padding: 14px 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 10px 12px;
      background: #EAF3DE;
      border-radius: 8px;
      border-left: 3px solid #1D9E75;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #1D9E75;
      border-radius: 50%;
    }

    .status-text {
      font-size: 12px;
      color: #27500A;
      font-weight: 500;
    }

    .section-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat-card {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }

    .stat-num {
      font-size: 22px;
      font-weight: 600;
      color: #1F3864;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #888;
    }

    .info-value {
      font-weight: 500;
      color: #222;
    }

    .footer {
      padding: 10px 16px;
      background: #f5f5f5;
      font-size: 11px;
      color: #888;
      text-align: center;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🛡️</div>
    <div>
      <div class="header-title">CloneGuard</div>
      <div class="header-sub">Clone propagation safeguard</div>
    </div>
  </div>

  <div class="body">

    <div class="status-row">
      <div class="status-dot"></div>
      <div class="status-text">Active — monitoring for clones</div>
    </div>

    <div class="section-label">Session stats</div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" id="clones-found">0</div>
        <div class="stat-label">Clones found</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="warnings-shown">0</div>
        <div class="stat-label">Warnings shown</div>
      </div>
    </div>

    <div class="section-label">Detection info</div>
    <div class="info-row">
      <span class="info-label">Layer 1</span>
      <span class="info-value">Token matching</span>
    </div>
    <div class="info-row">
      <span class="info-label">Layer 2</span>
      <span class="info-value">CodeBERT semantic</span>
    </div>
    <div class="info-row">
      <span class="info-label">Clone types</span>
      <span class="info-value">Type 1, 2, 3, 4</span>
    </div>
    <div class="info-row">
      <span class="info-label">Platform</span>
      <span class="info-value">GitHub, GitLab, Replit</span>
    </div>

  </div>

  <div class="footer">
    CloneGuard v1.0 — Vaansh Sanghrajka
  </div>

  <script src="popup.js"></script>
</body>
</html>
