plugins {
    id 'java'
    id 'org.jetbrains.intellij' version '1.16.1'
}

group 'com.cloneguard'
version = "1.1.0"

repositories {
    mavenCentral()
}

intellij {
    version = '2026.1.3'
    type = 'IU'
    plugins = ['com.intellij.java']
}

patchPluginXml {
    sinceBuild = '233'
    untilBuild = '261.*'
}

compileJava {
    sourceCompatibility = '17'
    targetCompatibility = '17'
}

dependencies {
    implementation 'com.google.code.gson:gson:2.10.1'
}

runIde {
    jvmArgs '-Xmx2g'
}
